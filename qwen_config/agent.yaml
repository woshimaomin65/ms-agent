# MS-Agent 配置文件
# 使用阿里云通义千问 qwen-plus 模型

llm:
  # 使用 DashScope 服务 (阿里云百炼平台)
  service: dashscope
  # 模型名称
  model: qwen-plus
  # API Key (也可以通过环境变量设置)
  # 方式 1: 直接在这里填写
  dashscope_api_key: sk-6cacbd1fc53f4c8ebd80fdfcfe75a533
  # 方式 2: 使用环境变量 (推荐)
  # export DASHSCOPE_API_KEY=sk-xxx
  #dashscope_api_key: ${DASHSCOPE_API_KEY:}
  # API 端点 - DashScope 兼容模式 v1
  dashscope_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  # 必需的配置项 (DashScope 类初始化时需要)
  modelscope_base_url: https://dashscope.aliyuncs.com/compatible-mode/v1

# 生成参数配置
generation_config:
  temperature: 0.7        # 创造性参数 (0.0-2.0)
  top_p: 0.9              # 核采样参数
  top_k: 50               # 前 K 个候选 token
  max_tokens: 2048        # 最大输出长度
  stream: false           # 是否启用流式输出
  show_reasoning: false   # 是否展示推理过程 (thinking)

# 提示词配置
prompt:
  # 系统提示词
  system: |
    你是一个有帮助的 AI 助手，使用通义千问 qwen-plus 模型。

    请遵循以下原则：
    1. 用与用户相同的语言回复
    2. 提供准确、详细的答案
    3. 如果有不确定的地方，请说明
    4. 对于代码相关问题，提供完整的代码示例和解释
    5. 展示详细的思考过程

# 最大对话轮数
max_chat_round: 10

# 是否保存对话历史到磁盘
save_history: false

# 工具配置
tools:
  # 文件系统工具 - 允许读写文件
  file_system:
    enabled: true

  # Shell 命令工具 - 允许执行 shell 命令
  shell:
    enabled: true

  # 代码执行工具 - 允许执行 Python 代码
  code_executor:
    implementation: python_env  # 可选：python_env (本地) 或 sandbox (沙箱)

  # Todo 列表工具 - 任务管理
  todo_list:
    enabled: true

  # 网络搜索工具 (需要 API Key)
  # web_search:
  #   engine: serpapi  # 或 'exa', 'arxiv'
  #   serpapi_api_key: ${SERPAPI_API_KEY:}
  #   fetch_content: true
  #   max_results: 5

  # 图像生成工具 (需要 API Key)
  # image_generator:
  #   service: dashscope
  #   api_key: ${DASHSCOPE_API_KEY:}

  # 金融数据工具
  # financial_data_fetcher:
  #   source: akshare  # 或 'baostock'

# 帮助信息 (出错时显示)
help: |
  这是一个使用 qwen-plus 模型的简单 Agent 配置。
  确保已设置 DASHSCOPE_API_KEY 环境变量。

  可用工具:
  - file_system: 文件读写
  - shell: Shell 命令执行
  - code_executor: Python 代码执行
  - todo_list: 任务管理
